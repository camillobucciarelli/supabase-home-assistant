name: Supabase
slug: supabase
version: "0.1.7"
description: Self-hosted Supabase stack managed from Home Assistant.
url: https://github.com/camillobucciarelli/supabase-home-assistant/tree/main/supabase
arch:
  - amd64
  - aarch64
startup: services
boot: manual
init: false
docker_api: true
options:
  public_url: http://homeassistant.local:8000
  public_host: homeassistant.local
  public_port: 8000
  site_url: http://homeassistant.local:8123
  dashboard_username: supabase
  dashboard_password: ""
  postgres_password: ""
  enable_email_signup: true
  enable_email_autoconfirm: false
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  smtp_admin_email: ""
  smtp_sender_name: Supabase
  supabase_ref: master
  enable_analytics: false
  recreate_on_start: false
  stop_stack_on_addon_stop: true
schema:
  public_url: url
  public_host: str
  public_port: port
  site_url: url
  dashboard_username: str
  dashboard_password: password
  postgres_password: password
  enable_email_signup: bool
  enable_email_autoconfirm: bool
  smtp_host: str
  smtp_port: port
  smtp_user: str
  smtp_password: password
  smtp_admin_email: str
  smtp_sender_name: str
  supabase_ref: str
  enable_analytics: bool
  recreate_on_start: bool
  stop_stack_on_addon_stop: bool
