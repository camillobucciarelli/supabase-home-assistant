name: Supabase
slug: supabase
version: "0.1.4"
description: Self-hosted Supabase stack managed from Home Assistant.
url: https://github.com/camillobucciarelli/supabase-home-assistant/tree/main/supabase
arch:
  - amd64
  - aarch64
startup: services
boot: manual
init: false
docker_api: true
ports:
  8000/tcp: 8000
  5432/tcp: null
  6543/tcp: null
ports_description:
  8000/tcp: Supabase API gateway and Studio
  5432/tcp: Supavisor session pooler, optional
  6543/tcp: Supavisor transaction pooler, optional
options:
  public_url: http://homeassistant.local:8000
  public_host: homeassistant.local
  public_port: 8000
  site_url: http://homeassistant.local:8123
  dashboard_username: supabase
  dashboard_password: ""
  postgres_password: ""
  supabase_ref: master
  enable_analytics: false
  recreate_on_start: false
  stop_stack_on_addon_stop: true
schema:
  public_url: url
  public_host: str
  public_port: port
  site_url: url
  dashboard_username: str
  dashboard_password: password
  postgres_password: password
  supabase_ref: str
  enable_analytics: bool
  recreate_on_start: bool
  stop_stack_on_addon_stop: bool
